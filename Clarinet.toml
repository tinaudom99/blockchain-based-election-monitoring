[project]
name = 'blockchain-based-election-monitoring'
description = ''
authors = []
telemetry = true
cache_dir = '.\.cache'
requirements = []
[contracts.ballot-contract]
path = 'contracts/ballot-contract.clar'
clarity_version = 3
epoch = 'latest'

[contracts.voter-registry]
path = 'contracts/voter-registry.clar'
clarity_version = 3
epoch = '3.2'
[repl.analysis]
passes = ['check_checker']

[repl.analysis.check_checker]
strict = false
trusted_sender = false
trusted_caller = false
callee_filter = false

[repl.remote_data]
enabled = false
api_url = 'https://api.hiro.so'
